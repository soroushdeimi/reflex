syntax = "proto3";

package xray.proxy.reflex;
option csharp_namespace = "Xray.Proxy.Reflex";
option go_package = "github.com/xtls/xray-core/proxy/reflex";
option java_package = "com.xray.proxy.reflex";
option java_multiple_files = true;

message User {
  string id = 1;     // UUID
  string policy = 2; // traffic policy e.g. "mimic-http2-api"
}

message Account {
  string id = 1; // UUID
}

message Fallback {
  uint32 dest = 1; // fallback destination port e.g. 80
}

message InboundConfig {
  repeated User clients = 1;
  Fallback fallback = 2;
}

message OutboundConfig {
  string address = 1;
  uint32 port = 2;
  string id = 3; // client UUID
}
