syntax = "proto3";

package reflex;

option go_package = "github.com/xtls/xray-core/proxy/reflex";

// =====================
// User definition
// =====================
message User {
  string id = 1;       // UUID
  string policy = 2;   // optional traffic profile name
}

// =====================
// Account (used internally)
// =====================
message Account {
  string id = 1;
}

// =====================
// Inbound configuration
// =====================
message InboundConfig {
  repeated User clients = 1;
  Fallback fallback = 2;
}

// =====================
// Fallback config
// =====================
message Fallback {
  uint32 dest = 1;   // fallback port
}

// =====================
// Outbound configuration
// =====================
message OutboundConfig {
  string address = 1;
  uint32 port = 2;
  string id = 3;     // UUID
}