syntax = "proto3";

package reflex.proxy;

option go_package = "github.com/xtls/xray-core/proxy/reflex";

message User {
  string id = 1;      // User UUID
  string policy = 2;  // Traffic policy/profile (e.g. "http2-api")
}

message Account {
  string id = 1; // User UUID
}

message InboundConfig {
  repeated User clients = 1;
  Fallback fallback = 2;
}

message Fallback {
  uint32 dest = 1; // Fallback destination port (e.g. 80)
}

message OutboundConfig {
  string address = 1;
  uint32 port = 2;
  string id = 3; // Client UUID
  string policy = 4; // Optional client policy/profile override
  bool use_http_handshake = 5; // Optional: use HTTP-like handshake instead of magic
}
